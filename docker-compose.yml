version: "3.9"

services:
  frontend:
    build: ./frontend
    restart: always
    networks:
      - app-network

  backend:
    build: ./backend
    restart: always
    env_file: .env
    volumes:
      - attendance_photos:/app/attendance_photos
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:6
    restart: always
    env_file: .env
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - attendance_photos:/app/attendance_photos
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
  attendance_photos:
