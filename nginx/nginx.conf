server {
    listen 80;

    # React frontend — all normal page requests
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # FastAPI backend — all API requests
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
