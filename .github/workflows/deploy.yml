name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build React app
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Write SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_KEY }}
        run: |
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Scan host key
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy all backend files to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r backend/ \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/attendance-system/

      - name: Copy built React files to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r frontend/build \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/attendance-system/frontend/

      - name: Copy config files to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              docker-compose.yml nginx/nginx.conf \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/attendance-system/

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "cd ~/attendance-system && \
               docker compose down && \
               docker compose up -d --build && \
               docker system prune -f && \
               echo 'Deployment complete!'"
